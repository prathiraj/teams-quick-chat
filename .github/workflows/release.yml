name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ inputs.version }}"
          else
            VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          fi
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VER" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish -c Release -r win-x64 -p:EnableWindowsTargeting=true -o publish

      - name: Create zip
        run: |
          cd publish && zip -r "../TeamsQuickChat-${{ steps.version.outputs.VERSION }}-win-x64.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: TeamsQuickChat ${{ steps.version.outputs.TAG }}
          generate_release_notes: true
          files: "TeamsQuickChat-${{ steps.version.outputs.VERSION }}-win-x64.zip"
