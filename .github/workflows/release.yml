name: Build, Release & Deploy Pages

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content TeamsQuickChat.csproj
          $version = $csproj.Project.PropertyGroup.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish -c Release

      - name: Copy icon to publish folder
        shell: pwsh
        run: |
          Copy-Item icon.ico bin/Release/net9.0-windows/win-x64/publish/icon.ico -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress | Out-Null
          Write-Output "Inno Setup installed"

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.version.outputs.version }} installer\TeamsQuickChat.iss

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ### Install (recommended)
            Download and run **`TeamsQuickChatSetup-${{ steps.version.outputs.version }}.exe`** — installs the app with optional auto-start on login.

            ### Portable
            Or download `TeamsQuickChat.exe` + `icon.ico` and run directly. No installation needed.

            No prerequisites — fully self-contained.
          files: |
            bin/Release/net9.0-windows/win-x64/publish/TeamsQuickChat.exe
            bin/Release/net9.0-windows/win-x64/publish/icon.ico
            installer/Output/TeamsQuickChatSetup-${{ steps.version.outputs.version }}.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
